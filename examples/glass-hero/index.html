<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; }
      sf-scene { position: absolute; inset: 0; }
      #headline {
        position: absolute; top: 320px; left: 180px; color: #fafafa;
        font-size: 110px; font-weight: 650; line-height: 1.05; letter-spacing: -0.02em;
      }
      #sub {
        position: absolute; top: 580px; left: 184px; color: #a1a1aa;
        font-size: 26px; letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <sf-scene duration="9" width="1920" height="1080" background="#0a0a0c"
              environment="assets/studio.hdr" exposure="0.85">
      <sf-camera fov="32" position="0.6 0.1 9" look-at="0 0 0"></sf-camera>
      <sf-light type="directional" color="#9db8ff" intensity="1.6" position="-5 4 6"></sf-light>
      <sf-light type="point" color="#7c5cff" intensity="60" position="5.5 2.5 -3"></sf-light>
      <sf-light type="point" color="#2dd4bf" intensity="45" position="1 -3 -2"></sf-light>

      <!-- full-frame glow plate behind the panels: what the glass refracts -->
      <sf-mesh geometry="plane" args="60 34" color="#05070d" emissive="#101b33"
               emissive-intensity="1.4" roughness="1" position="0 0 -7"></sf-mesh>
      <sf-mesh geometry="sphere" args="1.4" color="#0a0a0c" emissive="#6d48f5"
               emissive-intensity="2.6" position="5.8 2 -3.4"></sf-mesh>
      <sf-mesh geometry="sphere" args="0.9" color="#0a0a0c" emissive="#14b8a6"
               emissive-intensity="2" position="0.8 -2.6 -2.6"></sf-mesh>

      <sf-mesh id="panel-a" geometry="rounded-box" args="4.4 2.9 0.22 0.12"
               material="glass" color="#8493a8" roughness="0.16" thickness="0.5"
               env-map-intensity="1.8" position="1.6 0.5 0" rotation="6 -18 4"></sf-mesh>
      <sf-mesh id="panel-b" geometry="rounded-box" args="2.6 3.4 0.2 0.12"
               material="glass" color="#6b7e94" roughness="0.14" thickness="0.45"
               env-map-intensity="1.8" position="4.3 -0.9 -1.6" rotation="-4 14 -6"></sf-mesh>
      <sf-mesh id="panel-c" geometry="rounded-box" args="2.2 1.5 0.18 0.1"
               material="glass" color="#7a8d86" roughness="0.18" thickness="0.4"
               env-map-intensity="1.8" position="2.9 -1.7 1.4" rotation="10 -8 8"></sf-mesh>

      <sf-animate target="#panel-a" verb="float" amplitude="0.12" period="5"></sf-animate>
      <sf-animate target="#panel-b" verb="float" amplitude="0.16" period="6.2"></sf-animate>
      <sf-animate target="#panel-c" verb="float" amplitude="0.1" period="4.3"></sf-animate>
      <sf-animate target="#panel-a" verb="turntable" rpm="0.4" axis="y"></sf-animate>
      <sf-animate target="#panel-b" verb="turntable" rpm="-0.3" axis="y"></sf-animate>

      <sf-animate target="camera" verb="orbit" around="0 0 0" radius="9"
                  from="4deg" to="-8deg" height="0.1"
                  start="0" duration="9" ease="sine.inOut"></sf-animate>

      <sf-animate target="#headline" verb="fade-in" start="0.8" duration="1" rise="36"></sf-animate>
      <sf-animate target="#sub" verb="fade-in" start="1.5" duration="1" rise="24"></sf-animate>
    </sf-scene>

    <div id="headline" class="clip" data-start="0.8">Designed<br />in glass.</div>
    <div id="sub" class="clip" data-start="1.5">deterministic transmission · stereoframe</div>

    <script type="module">
      import "./assets/stereoframe.js";
    </script>
  </body>
</html>
