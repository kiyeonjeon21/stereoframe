<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #000; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; }
      sf-scene { position: absolute; inset: 0; }
      #title {
        position: absolute; bottom: 90px; width: 100%; text-align: center;
        font-size: 58px; font-weight: 700; letter-spacing: 0.05em; color: #fde9c8;
        text-shadow: 0 4px 28px rgba(0, 0, 0, 0.8);
      }
    </style>
  </head>
  <body>
    <sf-scene duration="8" width="1920" height="1080" background="#1b1430">
      <sf-camera fov="38" position="-6 1.6 5.5" look-at="#fox"
                 look-at-offset="0 0.7 0"></sf-camera>
      <sf-light preset="soft"></sf-light>
      <sf-light type="directional" color="#ffb070" intensity="2.2"
                position="-4 3 4"></sf-light>

      <sf-mesh geometry="plane" args="60 30" color="#332a4d" roughness="0.95"
               rotation="-90 0 0"></sf-mesh>

      <sf-model id="fox" src="assets/fox.glb" clip="Survey"
                position="-6 0 0" rotation="0 90 0" scale="0.02"></sf-model>

      <sf-particles preset="dust" count="900" seed="11" color="#ffb869"
                    size="0.05" opacity="0.7" amplitude="0.6"
                    area="16 5 8" position="0 2.2 0"></sf-particles>

      <sf-animate target="#fox" verb="crossfade-clip" from="Survey" to="Run"
                  start="1.2" duration="0.6"></sf-animate>
      <sf-animate target="#fox" verb="move" to="6 0 0"
                  start="1.5" duration="5.5" ease="power1.inOut"></sf-animate>
      <sf-animate target="camera" verb="follow" subject="#fox"
                  offset="0 1.6 5.5"></sf-animate>
      <sf-animate target="#title" verb="fade-in" start="2.2" duration="0.9" rise="36"></sf-animate>
    </sf-scene>

    <div id="title" class="clip" data-start="2.2">
      run cycle · camera follow · particles
    </div>

    <script type="module">
      import "./assets/stereoframe.js";
    </script>
  </body>
</html>
