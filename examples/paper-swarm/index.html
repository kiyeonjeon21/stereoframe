<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #f4f2ed; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; }
      sf-scene { position: absolute; inset: 0; }
      #footer {
        position: absolute; bottom: 56px; width: 100%; text-align: center;
        font-size: 24px; letter-spacing: 0.22em; text-transform: uppercase; color: #78716c;
      }
    </style>
  </head>
  <body>
    <sf-scene duration="8" width="1920" height="1080" background="#f4f2ed">
      <sf-camera fov="35" position="0 0 16" look-at="0 0 0"></sf-camera>
      <sf-light type="hemisphere" color="#ffffff" intensity="2.4"></sf-light>
      <sf-light type="directional" color="#fff7ed" intensity="1.4" position="4 6 8"></sf-light>

      <sf-swarm id="headline" text="EVERYTHING FALLS|INTO PLACE"
                font="900 150px Helvetica, Arial, sans-serif"
                count="2400" seed="7" size="0.14" width="13"
                palette="#1c1917,#44403c,#a8a29e,#dc2626,#f5f5f4"
                scatter="26 14 18" start="0.6" duration="4"
                stagger="0.55" ease="power3.inOut"></sf-swarm>

      <sf-animate target="camera" verb="dolly" toward="0 0 0" distance="2.5"
                  start="0.6" duration="5" ease="power2.inOut"></sf-animate>
      <sf-animate target="#footer" verb="fade-in" start="5" duration="1"></sf-animate>
    </sf-scene>

    <div id="footer" class="clip" data-start="5">stereoframe · paper swarm</div>

    <script type="module">
      import "./assets/stereoframe.js";
    </script>
  </body>
</html>
