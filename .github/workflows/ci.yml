name: ci

on:
  push:
    branches: [main]
    # Docs-only changes can't break the build/tests/render — skip the heavy
    # `check` for them. (They still ride to npm in the next real release's tarball.)
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip the auto-generated "release: vX" commit — release.yml already runs the
    # exact same `check` on that commit (via its tag) before publishing, so this
    # would just be a redundant parallel run. (PRs always run.)
    if: ${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'release:') }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chrome for Puppeteer
        run: bunx puppeteer browsers install chrome

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # The single source of truth — the same `bun run check` that `bun run release`
      # runs before publishing, so CI and the local release can never diverge:
      # build + unit tests + examples lint/validate + render smoke.
      - name: Check (build, tests, examples, render smoke)
        run: bun run check
