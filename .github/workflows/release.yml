name: release

# Publish to npm ONLY when a v* tag is pushed AND the check suite passes on that
# exact commit. `bun run release` creates the tag; npm can't receive a version
# GitHub hasn't verified green. NPM_TOKEN is a repo secret (never in the repo).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chrome for Puppeteer
        run: bunx puppeteer browsers install chrome

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Re-run the full gate on the tagged commit before publishing.
      - name: Check (build, tests, examples, render smoke)
        run: bun run check

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun scripts/publish.mjs

      - name: Build GitHub Release notes
        run: |
          set -euo pipefail
          prev_tag="$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)"

          {
            echo "## Changes"
            echo
            if [ -n "$prev_tag" ]; then
              git log --reverse --pretty=format:'- %s (%h)' "$prev_tag..$GITHUB_REF_NAME" | grep -v '^- release: v' || true
              echo
              echo
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev_tag}...${GITHUB_REF_NAME}"
            else
              git log --reverse --pretty=format:'- %s (%h)' "$GITHUB_REF_NAME" | grep -v '^- release: v' || true
            fi
          } > release-notes.md

          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $GITHUB_REF_NAME already exists"
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
